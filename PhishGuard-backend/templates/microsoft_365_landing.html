<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in to your account</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ms-card {
      background: #fff;
      width: 440px;
      padding: 44px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    .ms-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    /* Microsoft four-square logo */
    .ms-logo-squares {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      width: 24px;
      height: 24px;
    }
    .ms-logo-squares div:nth-child(1) { background: #f25022; }
    .ms-logo-squares div:nth-child(2) { background: #7fba00; }
    .ms-logo-squares div:nth-child(3) { background: #00a4ef; }
    .ms-logo-squares div:nth-child(4) { background: #ffb900; }

    .ms-logo-text {
      font-size: 1.35rem;
      font-weight: 600;
      color: #1b1b1b;
      letter-spacing: -0.3px;
    }

    .ms-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1b1b1b;
      margin-bottom: 12px;
    }

    .ms-subtitle {
      font-size: 0.9rem;
      color: #605e5c;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .ms-input-group {
      margin-bottom: 16px;
    }

    .ms-input-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #1b1b1b;
      margin-bottom: 4px;
    }

    .ms-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #8a8886;
      font-family: inherit;
      font-size: 0.9rem;
      color: #1b1b1b;
      outline: none;
      border-radius: 0;
      transition: border-color 0.15s;
    }

    .ms-input:focus {
      border-color: #0078d4;
      border-width: 2px;
    }

    .ms-input.error-input {
      border-color: #a4262c;
      border-width: 2px;
    }

    .ms-error {
      display: none;
      color: #a4262c;
      font-size: 0.78rem;
      margin-top: 4px;
    }

    .ms-options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      font-size: 0.82rem;
    }

    .ms-checkbox-label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #1b1b1b;
      cursor: pointer;
    }

    .ms-checkbox-label input { cursor: pointer; }

    .ms-forgot {
      color: #0078d4;
      text-decoration: none;
      font-size: 0.82rem;
    }
    .ms-forgot:hover { text-decoration: underline; }

    .ms-btn {
      width: 100%;
      padding: 10px;
      background: #0078d4;
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 16px;
      border-radius: 0;
    }
    .ms-btn:hover { background: #106ebe; }
    .ms-btn:disabled { background: #c8c6c4; cursor: not-allowed; }

    .ms-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .ms-divider-line { flex: 1; height: 1px; background: #edebe9; }
    .ms-divider-text { font-size: 0.78rem; color: #605e5c; }

    .ms-other-options {
      font-size: 0.82rem;
      color: #0078d4;
      text-align: center;
      cursor: pointer;
    }
    .ms-other-options:hover { text-decoration: underline; }

    .ms-footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #edebe9;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ms-footer a {
      font-size: 0.72rem;
      color: #605e5c;
      text-decoration: none;
    }
    .ms-footer a:hover { text-decoration: underline; color: #0078d4; }

    /* Loading spinner shown on submit */
    .ms-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="ms-card">
  <!-- Microsoft logo -->
  <div class="ms-logo">
    <div class="ms-logo-squares">
      <div></div><div></div><div></div><div></div>
    </div>
    <span class="ms-logo-text">Microsoft</span>
  </div>

  <div class="ms-title">Sign in</div>
  <div class="ms-subtitle" id="subtitleText">
    Use your Microsoft account to continue
  </div>

  <form id="msForm" onsubmit="handleSubmit(event)">
    <!-- Step 1: Email -->
    <div id="step1">
      <div class="ms-input-group">
        <label for="emailInput">Email, phone, or Skype</label>
        <input type="text" id="emailInput" class="ms-input"
               placeholder="Email, phone, or Skype" autocomplete="username"/>
        <div class="ms-error" id="emailError">Enter a valid email address</div>
      </div>
      <div class="ms-options-row">
        <span></span>
        <a href="#" class="ms-forgot">No account? Create one!</a>
      </div>
      <button type="button" class="ms-btn" onclick="nextStep()">Next</button>
    </div>

    <!-- Step 2: Password (hidden until email entered) -->
    <div id="step2" style="display:none">
      <div class="ms-input-group">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" class="ms-input"
               placeholder="Password" autocomplete="current-password"/>
        <div class="ms-error" id="passwordError">
          Your account or password is incorrect. If you don't remember your
          password, reset it now.
        </div>
      </div>
      <div class="ms-options-row">
        <label class="ms-checkbox-label">
          <input type="checkbox" id="keepSignedIn"/> Keep me signed in
        </label>
        <a href="#" class="ms-forgot">Forgot password?</a>
      </div>
      <button type="submit" class="ms-btn" id="signInBtn">
        <span id="btnText">Sign in</span>
        <div class="ms-spinner" id="btnSpinner"></div>
      </button>
    </div>
  </form>

  <div class="ms-divider">
    <div class="ms-divider-line"></div>
    <span class="ms-divider-text">or</span>
    <div class="ms-divider-line"></div>
  </div>

  <div class="ms-other-options">Sign-in options</div>

  <div class="ms-footer">
    <a href="#">Terms of use</a>
    <a href="#">Privacy & cookies</a>
    <a href="#">...</a>
  </div>
</div>
<script>
  const params      = new URLSearchParams(window.location.search);
  const campaignId  = params.get('campaign_id') || '';
  const targetEmail = params.get('email') || '';
  const phishType   = params.get('phishing_type') || 'landing';
  const category    = params.get('category') || '';

  // Pre-fill any email field on the page
  const emailField = document.getElementById('emailInput') || document.querySelector('input[type="email"]');
  if (emailField && targetEmail) emailField.value = targetEmail;

  let attempts = 0;

  async function handleSubmit(e) {
    if (e) e.preventDefault();
    const btn = document.getElementById('submitBtn') || document.querySelector('button[type="submit"]');
    const errMsg = document.getElementById('currentPassError') || document.getElementById('errorMsg');

    attempts++;

    // First submit — show fake error to seem realistic
    if (attempts === 1) {
      if (errMsg) errMsg.style.display = 'block';
      const passField = document.getElementById('currentPass') || document.getElementById('passwordInput') || document.querySelector('input[type="password"]');
      if (passField) { passField.value = ''; passField.focus(); }
      return;
    }

    // Second submit — log and redirect to training
    if (btn) { btn.textContent = 'Processing...'; btn.disabled = true; }

    const email = (emailField ? emailField.value : '') || targetEmail || 'unknown@phishguard.local';

    try {
      const resp = await fetch('http://127.0.0.1:5000/api/track/submit', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ campaign_id: campaignId, email: email }),
      });
      const data = await resp.json();
      // Use redirect URL from backend (contains phishing_type + category)
      if (data.redirect) {
        window.location.href = data.redirect;
      } else {
        window.location.href = 'http://127.0.0.1:8088/awareness-training.html?caught=1&stage=submitted&campaign_id=' + campaignId + '&phishing_type=' + phishType + '&category=' + encodeURIComponent(category);
      }
    } catch (err) {
      console.error('Submit tracking failed:', err);
      window.location.href = 'http://127.0.0.1:8088/awareness-training.html?caught=1&stage=submitted&campaign_id=' + campaignId + '&phishing_type=' + phishType + '&category=' + encodeURIComponent(category);
    }
  }

  // Wire up the form
  const form = document.querySelector('form');
  if (form) form.addEventListener('submit', handleSubmit);

  // Support "Sign In" / "Next" buttons that might not be in a form
  const submitBtn = document.getElementById('submitBtn') || document.getElementById('nextBtn');
  if (submitBtn && !form) submitBtn.addEventListener('click', handleSubmit);
</script>
</body>
</html>
