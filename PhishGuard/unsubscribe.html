<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Preferences Updated</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      max-width: 480px;
      width: 100%;
      padding: 48px 40px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 20px; }
    h1 { font-size: 1.4rem; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; }
    p { font-size: 0.9rem; color: #666; line-height: 1.7; margin-bottom: 16px; }
    .note { font-size: 0.78rem; color: #aaa; margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Your preferences have been updated</h1>
    <p>You have been successfully unsubscribed from this mailing list.</p>
    <p>You may still receive transactional emails related to your account activity.</p>
    <p class="note">
      If you unsubscribed by mistake, please contact your IT administrator.<br/>
      Reference ID: SYS-{{ range .}}{{end }}{{ .}}
    </p>
  </div>
</body>
</html>
